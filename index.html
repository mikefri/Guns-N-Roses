<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GN'R — Ma Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0a0a;
  --bg2:      #111111;
  --bg3:      #181818;
  --card:     #141414;
  --card2:    #1c1c1c;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --red:      #e01f1f;
  --red2:     #ff3333;
  --red-dim:  rgba(224,31,31,0.15);
  --white:    #f5f5f5;
  --off:      #c8c8c8;
  --muted:    #666;
  --muted2:   #888;
  --accent:   #e01f1f;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--white);
  min-height:100vh;
}

/* ══════════════════════════════ HERO HEADER */
.hero{
  position:relative;
  height:380px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}
.hero-img{
  position:absolute;inset:0;
  background:url('https://pbs.twimg.com/profile_banners/95955871/1765215082/1500x500') center/cover no-repeat;
  transform:scale(1.04);
  transition:transform 8s ease-out;
}
.hero-img.loaded{transform:scale(1);}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(10,10,10,0.25) 0%,
    rgba(10,10,10,0.1) 30%,
    rgba(10,10,10,0.7) 70%,
    rgba(10,10,10,0.97) 100%
  );
}
.hero-overlay-top{
  position:absolute;inset:0;
  background:linear-gradient(to right, rgba(10,10,10,0.5) 0%, transparent 50%, rgba(10,10,10,0.5) 100%);
}
.hero-content{
  position:relative;z-index:2;
  padding:0 48px 36px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:24px;
}
.hero-brand{}
.hero-eyebrow{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:5px;
  color:var(--red2);text-transform:uppercase;
  margin-bottom:6px;
}
.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:72px;line-height:.9;
  color:var(--white);
  letter-spacing:2px;
  text-shadow:0 2px 20px rgba(0,0,0,.8);
}
.hero-title span{color:var(--red2);}
.hero-subtitle{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:300;letter-spacing:4px;
  color:var(--muted2);text-transform:uppercase;
  margin-top:6px;
}
.hero-actions{
  display:flex;align-items:flex-end;gap:12px;flex-shrink:0;
}
.stat-block{
  text-align:center;
  padding:10px 20px;
  background:rgba(0,0,0,.6);
  border:1px solid var(--border2);
  backdrop-filter:blur(12px);
  border-radius:2px;
}
.stat-block .n{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;color:var(--white);line-height:1;
}
.stat-block .l{
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px;letter-spacing:3px;color:var(--muted2);text-transform:uppercase;
  margin-top:1px;
}
.btn-add{
  display:flex;align-items:center;gap:9px;
  background:var(--red);
  border:none;color:#fff;
  padding:12px 28px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;border-radius:2px;
  transition:all .2s;
  white-space:nowrap;
}
.btn-add:hover{background:var(--red2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(224,31,31,.4);}
.btn-add svg{width:13px;height:13px;}

/* ══════════════════════════════ STICKY NAV */
.nav-bar{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,.95);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.nav-bar::after{
  content:'';display:block;height:1px;
  background:linear-gradient(90deg,transparent,var(--red) 30%,var(--red) 70%,transparent);
  opacity:.4;
}
.nav-inner{
  max-width:1300px;margin:0 auto;
  padding:0 32px;
  display:flex;align-items:center;gap:0;
}
.nav-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;color:var(--white);letter-spacing:2px;
  padding:14px 24px 14px 0;
  border-right:1px solid var(--border);
  margin-right:8px;
  white-space:nowrap;
  flex-shrink:0;
}
.nav-logo span{color:var(--red);}
.filter-btn{
  padding:14px 18px;
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.filter-btn:hover{color:var(--white);}
.filter-btn.active{color:var(--white);border-bottom-color:var(--red);}
.filter-btn.wish-filter.active{color:#ffd700;border-bottom-color:#ffd700;}
.nav-sep{width:1px;height:18px;background:var(--border);flex-shrink:0;margin:0 4px;align-self:center;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;padding:8px 0;flex-shrink:0;}
.search-wrap{position:relative;}
.search-input{
  background:var(--bg3);
  border:1px solid var(--border2);
  color:var(--white);
  padding:8px 14px 8px 36px;
  border-radius:2px;
  font-family:'Barlow',sans-serif;font-size:14px;
  width:200px;outline:none;
  transition:border .2s,width .3s;
}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--red);width:240px;}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}

/* SYNC */
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sync-dot.ok{background:#22c55e;}
.sync-dot.loading{background:#f59e0b;animation:blink .8s infinite;}
.sync-dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-txt{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);}

/* ══════════════════════════════ MAIN */
main{max-width:1300px;margin:0 auto;padding:36px 32px;}

/* VALUE BAR */
.value-bar{
  display:grid;
  grid-template-columns:auto 1px 1fr;
  gap:0;
  background:var(--card);
  border:1px solid var(--border);
  border-left:3px solid var(--red);
  border-radius:2px;
  margin-bottom:36px;
  overflow:hidden;
}
.val-main{
  padding:20px 32px;
  display:flex;flex-direction:column;justify-content:center;
}
.val-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:600;letter-spacing:4px;text-transform:uppercase;
  color:var(--muted);margin-bottom:4px;
}
.val-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:42px;color:var(--white);line-height:1;
}
.val-divider{background:var(--border);}
.val-cats{
  padding:20px 32px;
  display:flex;align-items:center;gap:0;flex-wrap:wrap;
}
.val-cat{
  flex:1;min-width:90px;text-align:center;
  padding:8px 0;
}
.val-cat + .val-cat{border-left:1px solid var(--border);}
.val-cat .cn{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;color:var(--white);line-height:1;
}
.val-cat .cl{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:2px;
}

/* SECTION */
.section-hd{
  display:flex;align-items:center;gap:16px;
  margin-bottom:24px;
}
.section-hd-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:4px;
  text-transform:uppercase;color:var(--muted);
  white-space:nowrap;
}
.section-hd-line{flex:1;height:1px;background:var(--border);}
.section-hd-count{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;letter-spacing:1px;color:var(--muted);
  white-space:nowrap;
}

/* ══════════════════════════════ GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:16px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:3px;
  overflow:hidden;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  position:relative;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 48px rgba(0,0,0,.7);
  border-color:var(--border2);
}
.card.wishlist{border-color:rgba(255,215,0,.25);}
.card.wishlist:hover{border-color:rgba(255,215,0,.5);}

/* THUMB */
.card-thumb{
  height:185px;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:var(--bg2);
}
.card-thumb img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:transform .4s;
}
.card:hover .card-thumb img{transform:scale(1.07);}
.thumb-no-photo{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
}
.thumb-no-photo::before{
  content:'';position:absolute;inset:0;
  opacity:.06;
  background-image:repeating-linear-gradient(-45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);
  background-size:6px 6px;
}
.thumb-emoji{font-size:54px;position:relative;z-index:1;filter:drop-shadow(0 4px 10px rgba(0,0,0,.6));}
.thumb-color-vinyle{background:linear-gradient(135deg,#1a0000,#0a0a0a);}
.thumb-color-affiche{background:linear-gradient(135deg,#00081a,#0a0a0a);}
.thumb-color-vetement{background:linear-gradient(135deg,#001a00,#0a0a0a);}
.thumb-color-objet{background:linear-gradient(135deg,#0d0014,#0a0a0a);}

.cat-badge{
  position:absolute;top:10px;left:10px;z-index:3;
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:3px 9px;border-radius:1px;
}
.cat-badge.vinyle{background:var(--red);color:#fff;}
.cat-badge.affiche{background:#1a4a8a;color:#9fc8ff;}
.cat-badge.vetement{background:#1a5a28;color:#8fffb0;}
.cat-badge.objet{background:#4a1a7a;color:#d8a0ff;}

.wish-star{
  position:absolute;top:10px;right:10px;z-index:3;
  background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.12);
  color:var(--muted);width:30px;height:30px;border-radius:50%;
  cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.wish-star:hover{color:#ffd700;border-color:rgba(255,215,0,.4);}
.wish-star.active{color:#ffd700;border-color:rgba(255,215,0,.5);background:rgba(255,215,0,.12);}

.photo-hint{
  position:absolute;inset:0;z-index:2;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:12px;
  background:linear-gradient(0deg,rgba(0,0,0,.6) 0%,transparent 50%);
  opacity:0;transition:opacity .2s;
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.6);
  text-transform:uppercase;
}
.card:hover .photo-hint{opacity:1;}

/* CARD BODY */
.card-body{padding:14px 16px 13px;}
.card-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:16px;line-height:1.25;
  color:var(--white);margin-bottom:5px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-meta{
  display:flex;flex-wrap:wrap;align-items:center;gap:5px;
  margin-bottom:8px;
}
.card-meta-pill{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;letter-spacing:1px;color:var(--muted2);
}
.card-meta-sep{color:var(--border2);font-size:11px;}
.card-notes{
  font-size:13px;color:var(--muted);
  margin-bottom:12px;font-style:italic;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  line-height:1.5;
}
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--border);padding-top:11px;
}
.val-label2{
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;
}
.val-num2{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;color:var(--white);line-height:1;
}
.val-num2.has-value{color:var(--red2);}
.card-btns{display:flex;gap:6px;}
.btn-sm{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--muted);width:30px;height:30px;border-radius:2px;
  cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.btn-sm:hover{color:var(--white);border-color:var(--border2);}
.btn-sm.del:hover{color:#ff5555;border-color:rgba(224,31,31,.5);background:var(--red-dim);}

.empty-state{
  grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted);
}
.empty-ico{font-size:52px;opacity:.25;margin-bottom:14px;}
.empty-txt{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);
}
.loading-wrap{
  grid-column:1/-1;text-align:center;padding:80px 20px;
}
.spinner{
  width:32px;height:32px;border:2px solid var(--border);
  border-top-color:var(--red);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);
}

/* ══════════════════════════════ MODAL */
.modal-backdrop{
  position:fixed;inset:0;
  background:rgba(0,0,0,.88);
  backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;
  z-index:200;padding:20px;
}
.modal-backdrop.open{display:flex;}
.modal{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-top:2px solid var(--red);
  border-radius:3px;
  width:100%;max-width:540px;
  box-shadow:0 32px 80px rgba(0,0,0,.9);
  max-height:92vh;overflow-y:auto;
}
.modal-head{
  padding:20px 24px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--bg2);z-index:1;
}
.modal-head h2{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:2px;color:var(--white);
}
.modal-head h2 span{color:var(--red);}
.modal-close{
  background:none;border:none;color:var(--muted);
  font-size:20px;cursor:pointer;transition:color .2s;line-height:1;
}
.modal-close:hover{color:var(--white);}
.modal-body{padding:22px 24px;display:flex;flex-direction:column;gap:14px;}
.form-row{display:flex;gap:12px;}
.fg{display:flex;flex-direction:column;gap:5px;flex:1;}
.fg label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);
}
.fg input,.fg select,.fg textarea{
  background:var(--bg3);
  border:1px solid var(--border2);
  color:var(--white);
  padding:10px 12px;border-radius:2px;
  font-family:'Barlow',sans-serif;font-size:14px;
  outline:none;transition:border .2s,box-shadow .2s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  border-color:var(--red);
  box-shadow:0 0 0 3px rgba(224,31,31,.1);
}
.fg input[type="date"]{color-scheme:dark;}
.fg select option{background:var(--bg2);}
.fg textarea{resize:vertical;min-height:64px;}

/* PHOTO ZONE */
.photo-zone{
  border:1px dashed var(--border2);border-radius:2px;
  padding:24px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;position:relative;
}
.photo-zone:hover,.photo-zone.drag{border-color:var(--red);background:var(--red-dim);}
.photo-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pz-ico{font-size:26px;opacity:.5;margin-bottom:6px;}
.pz-txt{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;color:var(--muted2);}
.pz-hint{font-size:12px;color:var(--muted);margin-top:3px;font-style:italic;}
.photo-prev-wrap{position:relative;}
.photo-prev{width:100%;max-height:220px;object-fit:cover;border-radius:2px;border:1px solid var(--border);display:block;}
.photo-rm{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.75);border:1px solid var(--border2);
  color:#fff;width:26px;height:26px;border-radius:50%;
  cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.photo-rm:hover{background:var(--red);}

.form-sep{
  display:flex;align-items:center;gap:10px;
}
.form-sep span{
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);white-space:nowrap;
}
.form-sep::before,.form-sep::after{content:'';flex:1;height:1px;background:var(--border);}

.wish-chk{display:flex;align-items:center;gap:8px;cursor:pointer;}
.wish-chk input{accent-color:var(--red);width:14px;height:14px;cursor:pointer;}
.wish-chk span{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);
}

.modal-foot{
  padding:14px 24px;border-top:1px solid var(--border);
  display:flex;gap:8px;justify-content:flex-end;
}
.btn-cancel2{
  background:none;border:1px solid var(--border);color:var(--muted2);
  padding:9px 18px;border-radius:2px;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
}
.btn-cancel2:hover{border-color:var(--border2);color:var(--white);}
.btn-save2{
  background:var(--red);border:none;color:#fff;
  padding:9px 22px;border-radius:2px;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
  box-shadow:0 0 16px rgba(224,31,31,.3);
}
.btn-save2:hover{background:var(--red2);transform:translateY(-1px);}
.btn-save2:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.96);display:none;align-items:center;justify-content:center;z-index:300;}
.lightbox.open{display:flex;}
.lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:2px;}
.lb-close{position:absolute;top:20px;right:24px;background:none;border:none;color:rgba(255,255,255,.5);font-size:28px;cursor:pointer;transition:color .2s;}
.lb-close:hover{color:#fff;}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:400;
  background:var(--bg2);border:1px solid var(--border2);
  border-left:3px solid var(--red);
  padding:11px 16px;border-radius:2px;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;
  color:var(--white);box-shadow:0 8px 28px rgba(0,0,0,.6);
  transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-left-color:#22c55e;}
.toast.err{border-left-color:var(--red);}

@media(max-width:700px){
  .hero{height:260px;}
  .hero-content{padding:0 20px 24px;flex-direction:column;align-items:flex-start;gap:16px;}
  .hero-title{font-size:48px;}
  .hero-actions{flex-direction:row;width:100%;}
  .stat-block{display:none;}
  .nav-inner{padding:0 16px;}
  .nav-logo{display:none;}
  main{padding:24px 16px;}
  .grid{grid-template-columns:1fr 1fr;gap:12px;}
  .card-body{padding:10px 12px 10px;}
  .value-bar{grid-template-columns:1fr;border-left-width:3px;}
  .val-divider{display:none;}
  .form-row{flex-direction:column;}
}
</style>
</head>
<body>

<!-- ══════════ HERO ══════════ -->
<div class="hero">
  <div class="hero-img" id="hero-img"></div>
  <div class="hero-overlay"></div>
  <div class="hero-overlay-top"></div>
  <div class="hero-content">
    <div class="hero-brand">
      <div class="hero-eyebrow">Collection Privée</div>
      <div class="hero-title">GUNS<span>&nbsp;N'</span><br>ROSES</div>
      <div class="hero-subtitle">Welcome to the Jungle</div>
    </div>
    <div class="hero-actions">
      <div class="stat-block"><div class="n" id="count-total">—</div><div class="l">Items</div></div>
      <div class="stat-block"><div class="n" id="count-wish">—</div><div class="l">Wishlist</div></div>
      <button class="btn-add" onclick="openModal()">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
        Ajouter
      </button>
    </div>
  </div>
</div>

<!-- ══════════ NAV ══════════ -->
<nav class="nav-bar">
  <div class="nav-inner">
    <span class="nav-logo">GN<span>'</span>R</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">Tout</button>
    <div class="nav-sep"></div>
    <button class="filter-btn" onclick="setFilter('vinyle',this)">🎵 Vinyles</button>
    <button class="filter-btn" onclick="setFilter('affiche',this)">🖼️ Affiches</button>
    <button class="filter-btn" onclick="setFilter('vetement',this)">👕 Vêtements</button>
    <button class="filter-btn" onclick="setFilter('objet',this)">🎸 Objets</button>
    <div class="nav-sep"></div>
    <button class="filter-btn wish-filter" onclick="setFilter('wishlist',this)">⭐ Wishlist</button>
    <div class="nav-right">
      <div class="sync-dot loading" id="sync-dot"></div>
      <span class="sync-txt" id="sync-txt">Connexion…</span>
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search-input" type="text" placeholder="Rechercher…" oninput="doSearch(this.value)">
      </div>
    </div>
  </div>
</nav>

<!-- ══════════ MAIN ══════════ -->
<main>
  <div class="value-bar">
    <div class="val-main">
      <div class="val-label">Valeur totale estimée</div>
      <div class="val-num" id="val-total">0 €</div>
    </div>
    <div class="val-divider"></div>
    <div class="val-cats">
      <div class="val-cat"><div class="cn" id="val-vinyle">0 €</div><div class="cl">Vinyles/CDs</div></div>
      <div class="val-cat"><div class="cn" id="val-affiche">0 €</div><div class="cl">Affiches</div></div>
      <div class="val-cat"><div class="cn" id="val-vetement">0 €</div><div class="cl">Vêtements</div></div>
      <div class="val-cat"><div class="cn" id="val-objet">0 €</div><div class="cl">Objets</div></div>
    </div>
  </div>

  <div class="section-hd">
    <span class="section-hd-title">Ma Collection</span>
    <div class="section-hd-line"></div>
    <span class="section-hd-count" id="section-count">—</span>
  </div>

  <div class="grid" id="grid">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-txt">Chargement Firebase…</div>
    </div>
  </div>
</main>

<!-- ══════════ MODAL ══════════ -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Nouvel <span>Item</span></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label>Photo</label>
        <div id="upload-zone" class="photo-zone">
          <input type="file" id="f-photo" accept="image/*" onchange="handlePhoto(this)">
          <div class="pz-ico">📷</div>
          <div class="pz-txt">Clique ou glisse une photo</div>
          <div class="pz-hint">Stockée en base64 dans Firestore</div>
        </div>
        <div id="preview-wrap" style="display:none" class="photo-prev-wrap">
          <img id="preview-img" class="photo-prev" src="" alt="">
          <button class="photo-rm" type="button" onclick="removePhoto()">✕</button>
        </div>
      </div>
      <div class="form-sep"><span>Informations</span></div>
      <div class="fg">
        <label>Titre *</label>
        <input type="text" id="f-title" placeholder="ex : Appetite for Destruction — 1ère pression US">
      </div>
      <div class="form-row">
        <div class="fg">
          <label>Catégorie *</label>
          <select id="f-cat">
            <option value="vinyle">🎵 Vinyle / CD</option>
            <option value="affiche">🖼️ Affiche / Poster</option>
            <option value="vetement">👕 T-shirt / Vêtement</option>
            <option value="objet">🎸 Figurine / Objet</option>
          </select>
        </div>
        <div class="fg">
          <label>Année de sortie</label>
          <input type="text" id="f-year" placeholder="1987">
        </div>
      </div>
      <div class="form-row">
        <div class="fg">
          <label>Date d'achat</label>
          <input type="date" id="f-buydate">
        </div>
        <div class="fg">
          <label>État</label>
          <select id="f-state">
            <option value="">— non précisé</option>
            <option value="Mint">Mint (parfait)</option>
            <option value="Excellent">Excellent</option>
            <option value="Bon">Bon état</option>
            <option value="Passable">Passable</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label>Valeur estimée (€)</label>
        <input type="number" id="f-value" placeholder="0" min="0" step="0.01">
      </div>
      <div class="fg">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Provenance, numéro de série, dédicace…"></textarea>
      </div>
      <label class="wish-chk">
        <input type="checkbox" id="f-wish">
        <span>⭐ Ajouter à ma Wishlist</span>
      </label>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel2" onclick="closeModal()">Annuler</button>
      <button class="btn-save2" id="btn-save" onclick="saveItem()">Sauvegarder</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, onSnapshot,
  addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_xlwwTT5d848Orlek9L1X-1g7sLMjzlM",
  authDomain: "gnr-collection.firebaseapp.com",
  projectId: "gnr-collection",
  storageBucket: "gnr-collection.firebasestorage.app",
  messagingSenderId: "60619352431",
  appId: "1:60619352431:web:1d902a7a0195b3fb12609a"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const COL = "items";

const EMOJI = {vinyle:'🎵',affiche:'🖼️',vetement:'👕',objet:'🎸'};
const LABEL = {vinyle:'Vinyle/CD',affiche:'Affiche',vetement:'Vêtement',objet:'Objet'};

let items = [], editId = null, filterCat = 'all', searchQ = '', currentPhoto = null;

// Hero image animation
window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('hero-img').classList.add('loaded'), 100);
});

// Sync status
function setSyncStatus(state, txt) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-txt').textContent = txt;
}

// Firestore listener
const q = query(collection(db, COL), orderBy('createdAt','asc'));
onSnapshot(q,
  snap => {
    items = snap.docs.map(d => ({id:d.id,...d.data()}));
    setSyncStatus('ok', 'Synchronisé · '+items.length+' item'+(items.length!==1?'s':''));
    render();
  },
  err => {
    setSyncStatus('err', 'Erreur · '+err.message);
    toast('Erreur Firebase : '+err.message, 'err');
  }
);

// Helpers
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d){ if(!d) return null; try{ const [y,m,j]=d.split('-'); return `${j}/${m}/${y}`; }catch(e){ return d; } }
function fmtVal(v){ return v ? Number(v).toLocaleString('fr-FR')+'€' : '—'; }
function toast(msg, type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3000);
}

// Photo
window.handlePhoto = input => {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800; let w=img.width,h=img.height;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      const c=document.createElement('canvas'); c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      currentPhoto=c.toDataURL('image/jpeg',.82);
      showPreview(currentPhoto);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
};
function showPreview(src){
  document.getElementById('upload-zone').style.display='none';
  document.getElementById('preview-wrap').style.display='block';
  document.getElementById('preview-img').src=src;
}
window.removePhoto=()=>{
  currentPhoto=null;
  document.getElementById('f-photo').value='';
  document.getElementById('upload-zone').style.display='block';
  document.getElementById('preview-wrap').style.display='none';
  document.getElementById('preview-img').src='';
};
window.addEventListener('DOMContentLoaded',()=>{
  const z=document.getElementById('upload-zone');
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag');});
  z.addEventListener('dragleave',()=>z.classList.remove('drag'));
  z.addEventListener('drop',e=>{
    e.preventDefault();z.classList.remove('drag');
    const f=e.dataTransfer.files[0];
    if(f&&f.type.startsWith('image/')){
      const dt=new DataTransfer();dt.items.add(f);
      document.getElementById('f-photo').files=dt.files;
      window.handlePhoto(document.getElementById('f-photo'));
    }
  });
});

// Render
function render(){
  const q2=searchQ.toLowerCase();
  let vis=items.filter(it=>{
    if(filterCat==='wishlist') return it.wish;
    if(filterCat!=='all'&&it.cat!==filterCat) return false;
    if(q2&&!it.title.toLowerCase().includes(q2)&&!(it.notes||'').toLowerCase().includes(q2)) return false;
    return true;
  });

  document.getElementById('count-total').textContent=items.length;
  document.getElementById('count-wish').textContent=items.filter(i=>i.wish).length;
  document.getElementById('section-count').textContent=vis.length+' item'+(vis.length!==1?'s':'');

  const cv={vinyle:0,affiche:0,vetement:0,objet:0};
  items.forEach(i=>{ if(!i.wish) cv[i.cat]=(cv[i.cat]||0)+(parseFloat(i.value)||0); });
  document.getElementById('val-total').textContent=Object.values(cv).reduce((a,b)=>a+b,0).toLocaleString('fr-FR')+' €';
  ['vinyle','affiche','vetement','objet'].forEach(k=>{
    const el=document.getElementById('val-'+k); if(el) el.textContent=(cv[k]||0).toLocaleString('fr-FR')+' €';
  });

  const grid=document.getElementById('grid');
  if(!vis.length){
    grid.innerHTML=`<div class="empty-state"><div class="empty-ico">🎸</div><div class="empty-txt">Aucun item — Welcome to the Jungle</div></div>`;
    return;
  }

  grid.innerHTML=vis.map(item=>{
    const parts=[];
    if(item.year) parts.push(esc(item.year));
    if(item.state) parts.push(esc(item.state));
    if(item.buydate) parts.push('Acheté le '+fmtDate(item.buydate));
    const meta=parts.map((p,i)=>i<parts.length-1
      ?`<span class="card-meta-pill">${p}</span><span class="card-meta-sep">·</span>`
      :`<span class="card-meta-pill">${p}</span>`).join('');

    const thumb=item.photo
      ?`<img src="${item.photo}" alt="${esc(item.title)}" loading="lazy">`
      :`<div class="thumb-no-photo thumb-color-${item.cat}"><span class="thumb-emoji">${EMOJI[item.cat]}</span></div>`;

    const hasVal=item.value&&item.value>0;
    return `
    <div class="card${item.wish?' wishlist':''}">
      <div class="card-thumb" ${item.photo?`onclick="openLightbox('${item.id}')"`:''}>
        ${thumb}
        <span class="cat-badge ${item.cat}">${LABEL[item.cat]}</span>
        <button class="wish-star${item.wish?' active':''}" onclick="event.stopPropagation();toggleWish('${item.id}')">⭐</button>
        ${item.photo?`<div class="photo-hint">▲ Agrandir</div>`:''}
      </div>
      <div class="card-body">
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-meta">${meta}</div>
        ${item.notes?`<div class="card-notes">${esc(item.notes)}</div>`:''}
        <div class="card-footer">
          <div>
            <div class="val-label2">Valeur estimée</div>
            <div class="val-num2${hasVal?' has-value':''}">${fmtVal(item.value)}</div>
          </div>
          <div class="card-btns">
            <button class="btn-sm" onclick="editItem('${item.id}')">✏️</button>
            <button class="btn-sm del" onclick="deleteItem('${item.id}')">🗑️</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Lightbox
window.openLightbox=id=>{
  const it=items.find(i=>i.id===id); if(!it||!it.photo) return;
  document.getElementById('lb-img').src=it.photo;
  document.getElementById('lightbox').classList.add('open');
};
window.closeLightbox=()=>document.getElementById('lightbox').classList.remove('open');

// Filter / Search
window.setFilter=(cat,btn)=>{
  filterCat=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
};
window.doSearch=q=>{searchQ=q;render();};

// Wishlist
window.toggleWish=async id=>{
  const it=items.find(i=>i.id===id); if(!it) return;
  try{ await updateDoc(doc(db,COL,id),{wish:!it.wish}); }
  catch(e){ toast('Erreur : '+e.message,'err'); }
};

// Modal
window.openModal=(id=null)=>{
  editId=id;
  const it=id?items.find(i=>i.id===id):null;
  currentPhoto=it?.photo||null;
  const ttl=document.getElementById('modal-title');
  ttl.innerHTML=id?'Modifier <span>Item</span>':'Nouvel <span>Item</span>';
  document.getElementById('f-title').value=it?.title||'';
  document.getElementById('f-cat').value=it?.cat||'vinyle';
  document.getElementById('f-year').value=it?.year||'';
  document.getElementById('f-buydate').value=it?.buydate||'';
  document.getElementById('f-value').value=it?.value||'';
  document.getElementById('f-state').value=it?.state||'';
  document.getElementById('f-notes').value=it?.notes||'';
  document.getElementById('f-wish').checked=it?.wish||false;
  document.getElementById('f-photo').value='';
  if(currentPhoto) showPreview(currentPhoto); else window.removePhoto();
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),60);
};
window.closeModal=()=>{
  document.getElementById('modal').classList.remove('open');
  editId=null; currentPhoto=null;
};
window.saveItem=async()=>{
  const title=document.getElementById('f-title').value.trim();
  if(!title){ document.getElementById('f-title').focus(); return; }
  const btn=document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='Envoi…';
  const data={
    title,
    cat:document.getElementById('f-cat').value,
    year:document.getElementById('f-year').value.trim(),
    buydate:document.getElementById('f-buydate').value,
    value:parseFloat(document.getElementById('f-value').value)||0,
    state:document.getElementById('f-state').value,
    notes:document.getElementById('f-notes').value.trim(),
    wish:document.getElementById('f-wish').checked,
    photo:currentPhoto,
  };
  try{
    if(editId){ await updateDoc(doc(db,COL,editId),data); toast('Item mis à jour','ok'); }
    else{ data.createdAt=serverTimestamp(); await addDoc(collection(db,COL),data); toast('Item ajouté à la collection','ok'); }
    window.closeModal();
  }catch(e){ toast('Erreur : '+e.message,'err'); }
  finally{ btn.disabled=false; btn.textContent='Sauvegarder'; }
};
window.editItem=id=>window.openModal(id);
window.deleteItem=async id=>{
  if(!confirm('Supprimer cet item ?')) return;
  try{ await deleteDoc(doc(db,COL,id)); toast('Item supprimé','ok'); }
  catch(e){ toast('Erreur : '+e.message,'err'); }
};

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ window.closeModal(); window.closeLightbox(); }
});
document.getElementById('modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal')) window.closeModal();
});
</script>
</body>
</html>
